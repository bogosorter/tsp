{% extends 'template.html' %}

{% block content %}
<div class="vertical-spacer-lg"></div>
<div class="container d-flex flex-column align-items-center">
    <h1>TSP Challenge</h1>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Score</th>
        </tr>
      </thead>
      <tbody>
        {% for submission in submissions %}
        <tr>
          <td>{{ submission.name }}</td>
          <td>{{ submission.score }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
</div>
{% endblock %}
